<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>You’re on the list | Pump Bar</title>

  <style>
    :root {
      --black: #050505;
      --grey: #b7b7b7;
      --white: #f5f5f0;
      --pink: #ff2f86;
      --pink-glow: rgba(255, 47, 134, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 70% 20%, rgba(255, 47, 134, 0.16), transparent 30%),
        var(--black);
      color: var(--white);
      font-family: Arial, Helvetica, sans-serif;
      padding: 32px;
      text-align: center;
    }

    .card {
      max-width: 720px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 32px;
      padding: 56px 38px;
      background: rgba(18,18,21,0.86);
      box-shadow: 0 40px 90px rgba(0,0,0,0.45);
    }

    p:first-child {
      color: var(--pink);
      text-transform: uppercase;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.14em;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(46px, 8vw, 92px);
      line-height: 0.9;
      letter-spacing: -0.08em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    h1 span {
      color: var(--pink);
      text-shadow: 0 0 30px var(--pink-glow);
    }

    .text {
      color: var(--grey);
      font-size: 18px;
      margin-bottom: 34px;
    }

    a {
      display: inline-block;
      padding: 15px 23px;
      border-radius: 999px;
      background: var(--pink);
      color: white;
      text-decoration: none;
      font-weight: 900;
      box-shadow: 0 12px 45px rgba(255, 47, 134, 0.24);
    }
  </style>
</head>

<body>
  <div class="card">
    <p>You’re on the list</p>
    <h1>Welcome to <span>Pump Bar.</span></h1>
    <p class="text">
      You’ll be first to hear about samples, launch updates and early access.
    </p>
    <a href="/">Back to site</a>
  </div>
</body>
</html>
